<body>
<div id="app"><div class="loading">読み込み中…</div></div>
<div id="toast" class="toast"></div>
<script>
'use strict';
var APP_V='1.0.0';
var DAY=86400000;
var BOX_DAYS=[0,1,3,7,14];           // Leitner: box番号 → 次回出題までの日数
var MASTER_BOX=3;                    // box3以上＝マスター扱い
var DATA=[];
var STATS={};                        // id → {s,c,w,st,last,box,due}
var META={streak:0,lastDay:'',best:0};
var NOTES={};                        // id → 自分メモ
var IDEAS=[];                        // 追加したい問題のメモ [{t,d}]
var TRLOG={};                        // id → [{d,sc,t,f}] 和訳の過去回答（直近5回）
var HIDE={};                         // id → 1 卒業（出題対象から除外）

/* ---------- 永続化：IndexedDB（localStorageにも二重保存） ---------- */
var DB_KEY='kdai_kyoto_v1';
var LEGACY_KEY='kdai_kyoto_stats_v1';
var dbp=null;
function openDB(){
  if(dbp)return dbp;
  dbp=new Promise(function(res,rej){
    if(!window.indexedDB){rej(new Error('no idb'));return;}
    var r=indexedDB.open('kdai',1);
    r.onupgradeneeded=function(){r.result.createObjectStore('kv');};
    r.onsuccess=function(){res(r.result);};
    r.onerror=function(){rej(r.error);};
  });
  return dbp;
}
function idbGet(k){
  return openDB().then(function(db){
    return new Promise(function(res,rej){
      var q=db.transaction('kv','readonly').objectStore('kv').get(k);
      q.onsuccess=function(){res(q.result);};
      q.onerror=function(){rej(q.error);};
    });
  });
}
function idbSet(k,v){
  return openDB().then(function(db){
    return new Promise(function(res,rej){
      var t=db.transaction('kv','readwrite');
      t.objectStore('kv').put(v,k);
      t.oncomplete=function(){res();};
      t.onerror=function(){rej(t.error);};
    });
  });
}
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function snapshot(){return {v:2,app:APP_V,exported:new Date().toISOString(),stats:STATS,meta:META,notes:NOTES,ideas:IDEAS,trlog:TRLOG,hide:HIDE};}
function save(){
  var json=JSON.stringify(snapshot());
  lsSet(DB_KEY,json);                       // 同期の安全網
  idbGet && idbSet(DB_KEY,json).catch(function(){});
  schedulePush();                           // Gist設定済みなら自動アップロード
}
function migrateLegacy(){
  // 旧プロトタイプ（localStorage kdai_stats_v1）からの移行
  var raw=lsGet(LEGACY_KEY);
  if(!raw)return false;
  try{
    var old=JSON.parse(raw);var now=Date.now();
    Object.keys(old).forEach(function(id){
      var s=old[id];
      var box=(s.st>=2)?2:(s.s>0?1:0);
      if(s.w>0&&s.st<2)box=0;
      STATS[id]={s:s.s||0,c:s.c||0,w:s.w||0,st:s.st||0,last:s.last||'',box:box,due:now};
    });
    return true;
  }catch(e){return false;}
}
function applySnapshot(obj){
  if(!obj||obj.v!==2||typeof obj.stats!=='object')throw new Error('bad format');
  STATS=obj.stats||{};
  META=obj.meta||{streak:0,lastDay:'',best:0};
  NOTES=obj.notes||{};
  IDEAS=obj.ideas||[];
  TRLOG=obj.trlog||{};
  HIDE=obj.hide||{};
}

/* ---------- 端末間同期（GitHub Gist・無料） ---------- */
var SYNC_KEY='kdai_kyoto_sync_v1';         // {tok,gist} この端末のみ・エクスポートには含めない
var GIST_FILE='kdai-kyoto-progress.json';
var SYNC={tok:'',gist:''};
var syncState={last:0,err:''};
function loadSyncCfg(){try{var r=lsGet(SYNC_KEY);if(r)SYNC=JSON.parse(r);}catch(e){}}
function saveSyncCfg(){lsSet(SYNC_KEY,JSON.stringify(SYNC));}
function gh(method,path,body){
  return fetch('https://api.github.com'+path,{
    method:method,
    headers:{'Authorization':'Bearer '+SYNC.tok,'Accept':'application/vnd.github+json'},
    body:body?JSON.stringify(body):undefined
  }).then(function(r){
    if(!r.ok)throw new Error('GitHub API '+r.status);
    return r.status===204?null:r.json();
  });
}
function schedulePush(){
  if(!SYNC.tok||!SYNC.gist)return;
  clearTimeout(schedulePush._t);
  schedulePush._t=setTimeout(pushSync,800);  // 連打をまとめる（1問ごとに即時同期）
}
function pushSync(){
  if(!SYNC.tok||!SYNC.gist)return Promise.resolve();
  var files={};files[GIST_FILE]={content:JSON.stringify(snapshot())};
  return gh('PATCH','/gists/'+SYNC.gist,{files:files}).then(function(){
    syncState.last=Date.now();syncState.err='';updateSyncBadge();
  },function(e){
    syncState.err=e.message;updateSyncBadge();
  });
}
function pullSync(){
  if(!SYNC.tok||!SYNC.gist)return Promise.resolve();
  return gh('GET','/gists/'+SYNC.gist).then(function(g){
    var f=g.files&&g.files[GIST_FILE];
    if(!f)return;
    var p=f.truncated?fetch(f.raw_url).then(function(r){return r.text();}):Promise.resolve(f.content);
    return p.then(function(txt){
      var remote=JSON.parse(txt);
      var remoteExp=Date.parse(remote.exported||'')||0;
      var localExp=0;
      try{localExp=Date.parse(JSON.parse(lsGet(DB_KEY)||'null').exported||'')||0;}catch(e){}
      if(remoteExp>localExp){
        applySnapshot(remote);
        var json=JSON.stringify(snapshot());
        lsSet(DB_KEY,json);idbSet(DB_KEY,json).catch(function(){});
      }else if(localExp>remoteExp){
        schedulePush();
      }
      syncState.last=Date.now();syncState.err='';
    });
  }).catch(function(e){syncState.err=e.message;});
}
function syncText(){
  if(!SYNC.tok)return '';
  if(syncState.err)return '☁ 同期エラー（データ管理から確認）';
  if(syncState.last)return '☁ 同期済み '+new Date(syncState.last).toLocaleTimeString().slice(0,5);
  return '☁ 同期設定済み';
}
function updateSyncBadge(){
  var el=document.getElementById('syncBadge');
  if(el)el.textContent=syncText();
}
function setupSync(){
  var tok=(document.getElementById('tokIn').value||'').trim();
  if(!tok){toast('トークンを貼り付けてください');return;}
  SYNC.tok=tok;
  toast('GitHub に接続中…');
  gh('GET','/gists?per_page=100').then(function(list){
    for(var i=0;i<list.length;i++){
      if(list[i].files&&list[i].files[GIST_FILE])return list[i];  // 他端末が作成済み
    }
    var files={};files[GIST_FILE]={content:JSON.stringify(snapshot())};
    return gh('POST','/gists',{description:'航大英語ドリル 進捗（自動同期）',public:false,files:files});
  }).then(function(g){
    SYNC.gist=g.id;saveSyncCfg();
    return pullSync();
  }).then(function(){
    toast('同期を設定しました');
    renderData();
  }).catch(function(e){
    SYNC={tok:'',gist:''};
    toast('設定に失敗しました（'+e.message+'）');
  });
}
function clearSyncCfg(){
  if(!confirm('この端末の同期設定を解除します。Gist上のデータと学習履歴はそのまま残ります。'))return;
  SYNC={tok:'',gist:''};saveSyncCfg();
  syncState={last:0,err:''};
  renderData();
}

/* ---------- Claude採点（Anthropic API・この端末のみにキー保存） ---------- */
var AI_KEY='kdai_ai_v1';
var AI={key:'',model:'claude-opus-4-8'};
function loadAiCfg(){try{var r=lsGet(AI_KEY);if(r)AI=JSON.parse(r);}catch(e){}}
function persistAiCfg(){lsSet(AI_KEY,JSON.stringify(AI));}
function aiHeaders(key){
  return {
    'content-type':'application/json',
    'x-api-key':key,
    'anthropic-version':'2023-06-01',
    'anthropic-dangerous-direct-browser-access':'true'
  };
}
function aiSave(){
  var k=(document.getElementById('aiKeyIn').value||'').trim();
  var m=document.getElementById('aiModel').value;
  if(!k&&!AI.key){toast('APIキーを貼り付けてください');return;}
  var key=k||AI.key;
  toast('キーを確認中…');
  // count_tokens は無料エンドポイント。キーとモデルの有効性だけ検証する
  fetch('https://api.anthropic.com/v1/messages/count_tokens',{
    method:'POST',headers:aiHeaders(key),
    body:JSON.stringify({model:m,messages:[{role:'user',content:'ping'}]})
  }).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    AI.key=key;AI.model=m;persistAiCfg();
    toast('Claude採点を設定しました');
    renderData();
  }).catch(function(e){
    toast('確認に失敗しました（'+e.message+'）。キーを確認してください');
  });
}
function aiClear(){
  if(!confirm('この端末のClaude採点設定（APIキー）を解除します。'))return;
  AI={key:'',model:AI.model};persistAiCfg();
  renderData();
}
// clawd（Claude Code起動ロゴのピクセルアート）。フォント依存で崩れないようSVGで描画
// ターミナルの文字セルは縦長（高さ≈幅の2倍）なので、縦2倍に伸ばして本来の形にする
var CLAWD='<svg class="clawd" width="28" height="16" viewBox="0 0 18 5" preserveAspectRatio="none" fill="#D97757" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg">'
+'<rect x="3" y="0" width="12" height="1"/>'
+'<rect x="3" y="1" width="2" height="1"/><rect x="6" y="1" width="6" height="1"/><rect x="13" y="1" width="2" height="1"/>'
+'<rect x="1" y="2" width="16" height="1"/>'
+'<rect x="3" y="3" width="12" height="1"/>'
+'<rect x="4" y="4" width="1" height="1"/><rect x="6" y="4" width="1" height="1"/><rect x="11" y="4" width="1" height="1"/><rect x="13" y="4" width="1" height="1"/>'
+'</svg>';
function aiGrade(){
  var x=session[idx];
  var mine=(document.getElementById('trIn').value||'').trim();
  var box=document.getElementById('aibox');
  if(!mine){toast('先に自分の訳を入力してください');return;}
  box.innerHTML='<div class="exp aifb"><div class="verd">'+CLAWD+'Claude添削</div><div class="mut">添削中…（数秒かかります）</div></div>';
  var excerpt=x.q.indexOf('**')>=0;
  var sys='あなたは京都大学の英文和訳を採点する予備校講師。学生の訳を訳例と比較して採点する。\n'
  +'- 京大方式の部分点制: 訳出対象を構文要素（骨格SV・従属節・挿入・指示語・語彙）に分けて配点し、要素ごとに判定して合計を10点満点に換算する\n'
  +'- 1行目は必ず「採点: n/10」の形式（nは0〜10の整数。この形式を厳守）\n'
  +'- 2行目以降、減点した要素だけを「**−n点**: 指摘（正しい訳し方）」の形式で1行ずつ書く\n'
  +'- 構文の取り違え・構造を曖昧にした誤魔化し訳は重く、訳語の選択や日本語の綾は軽く減点する\n'
  +'- 意訳は構造が正確に取れていれば減点しない\n'
  +'- 訳例の全文再掲は禁止。前置き・講評・励ましは書かない。全体で最大300字。装飾は**太字**のみ\n'
  +(excerpt?'- 英文中の **〜** で囲まれた部分だけが採点対象。前後の文は文脈であり、文脈に合った語義選択・指示語の訳出も配点に含める\n':'');
  var prompt='次の英文和訳を添削してください。\n\n【英文】\n'+x.q+'\n\n【訳例】\n'+x.a+'\n\n【学生の訳】\n'+mine;
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:aiHeaders(AI.key),
    body:JSON.stringify({
      model:AI.model,
      max_tokens:1500,
      thinking:{type:'adaptive'},
      output_config:{effort:'low'},   // 訳例との比較採点なので低effortで十分。品質が落ちたらmediumへ
      system:sys,
      messages:[{role:'user',content:prompt}]
    })
  }).then(function(r){
    if(!r.ok){
      return r.json().catch(function(){return null;}).then(function(j){
        throw new Error((j&&j.error&&j.error.message)||('HTTP '+r.status));
      });
    }
    return r.json();
  }).then(function(res){
    var txt='';
    for(var i=0;i<res.content.length;i++){
      if(res.content[i].type==='text')txt+=res.content[i].text;
    }
    if(!txt)throw new Error('応答が空でした');
    var m=txt.match(/採点[:：]\s*(\d{1,2})\s*[\/／]\s*10/);

    if(m&&+m[1]<=10){

    }else{
      document.getElementById('grade').style.display='';  // 点数が読めなければ手動採点に切替
      toast('点数を読み取れませんでした。自己採点してください');

    +'<button class="ghost" onclick="aiGrade()">もう一度試す</button></div>';

  });

/* ---------- SRS（Leitner） ---------- */
function stat(id){return STATS[id]||{s:0,c:0,w:0,st:0,last:'',box:0,due:0};}
function record(id,ok){
  var s=stat(id);var now=Date.now();
  s.s++;
  if(ok){s.c++;s.st++;s.box=Math.min((s.box||0)+1,BOX_DAYS.length-1);}
  else{s.w++;s.st=0;s.box=0;}
  s.due=now+BOX_DAYS[s.box]*DAY;
  s.last=ok?'o':'x';
  STATS[id]=s;
  bumpStreak();
  save();
}
function localDay(t){
  var d=t?new Date(t):new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function bumpStreak(){
  var today=localDay();
  if(META.lastDay===today)return;
  var yest=localDay(Date.now()-DAY);
  META.streak=(META.lastDay===yest)?(META.streak||0)+1:1;
  META.lastDay=today;
  if(META.streak>(META.best||0))META.best=META.streak;
}
function currentStreak(){
  if(!META.lastDay)return 0;
  var today=localDay(),yest=localDay(Date.now()-DAY);
  return (META.lastDay===today||META.lastDay===yest)?(META.streak||0):0;
}
// tier: 0=復習待ち(due超過) 1=未学習 2=学習中 3=マスター
function tier(x){
  var s=stat(x.id);var now=Date.now();
  if(s.s===0)return 1;
  if(s.due<=now)return 0;
  return s.box>=MASTER_BOX?3:2;
}
function counts(pred){
  var AD=activeData();
  if(pred)AD=AD.filter(pred);
  var c={review:0,newq:0,learning:0,mastered:0,seen:0,correct:0,total:AD.length};
  for(var i=0;i<AD.length;i++){
    var t=tier(AD[i]);
    if(t===0)c.review++;else if(t===1)c.newq++;else if(t===2)c.learning++;else c.mastered++;
    var s=stat(AD[i].id);c.seen+=s.s;c.correct+=s.c;
  }
  return c;
}
function isTr(x){return x.type==='tr';}
function notTr(x){return x.type!=='tr';}
function isMiss(x){var s=stat(x.id);return s.w>0&&s.box<MASTER_BOX;}
function activeData(){return DATA.filter(function(x){return !HIDE[x.id];});}
// 正解でも「まだ不安」な問題を手動で復習ボックスに戻す（正答記録はそのまま）
function demote(id,btn){
  var s=stat(id);
  s.box=0;s.st=0;s.due=Date.now();
  STATS[id]=s;save();
  if(btn){btn.textContent='✓ 復習ボックスに戻しました（次のスマート復習で優先出題）';btn.onclick=null;}
  toast('復習ボックスに戻しました');
}
function demoteBtn(id){
  return '<button class="ghost" onclick="demote('+id+',this)">正解したけど不安 — 復習ボックスに戻す</button>';
}
function graduate(id,btn){
  HIDE[id]=1;save();
  if(btn){btn.textContent='✓ 卒業済み';btn.onclick=null;}
  toast('卒業にしました。今後出題されません');
}
function restoreQ(id){delete HIDE[id];save();renderData();}
function restoreAllQ(){
  if(!confirm('卒業したすべての問題を出題対象に戻します。よろしいですか？'))return;
  HIDE={};save();renderData();
}
// smart: due超過（期限切れが古い順）→ 未学習 → 学習中/マスター（due近い順）
function smartOrder(pool,n){
  var t=[[],[],[],[]];
  for(var i=0;i<pool.length;i++)t[tier(pool[i])].push(pool[i]);
  var byDue=function(a,b){return stat(a.id).due-stat(b.id).due;};
  t[0].sort(byDue);
  shuffle(t[1]);
  var rest=t[2].concat(t[3]).sort(byDue);
  return t[0].concat(t[1],rest).slice(0,n);
}
function makeSession(mode,part){
  var AD=activeData();
  var list;
  if(mode==='mistakes'){
    list=AD.filter(function(x){return notTr(x)&&isMiss(x);});shuffle(list);
  }else if(mode==='trmistakes'){
    list=AD.filter(function(x){return isTr(x)&&isMiss(x);});shuffle(list);
  }else if(mode==='part'){
    list=AD.filter(function(x){return x.part===part;});shuffle(list);
  }else if(mode==='cat'){
    list=AD.filter(function(x){return x.cat===part;});shuffle(list);
  }else if(mode==='all'){
    list=AD.filter(notTr);shuffle(list);list=list.slice(0,25);
  }else if(mode==='trsmart'){
    list=smartOrder(AD.filter(isTr),8);
  }else{
    list=smartOrder(AD.filter(notTr),20);
  }
  return list;
}

/* ---------- ユーティリティ ---------- */
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toast._t);toast._t=setTimeout(function(){el.classList.remove('show');},2200);
}
function copyText(t,msg){
  function fb(){
    var ta=document.createElement('textarea');
    ta.value=t;document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');toast(msg);}catch(e){toast('コピーできませんでした');}
    ta.remove();
  }
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(t).then(function(){toast(msg);},fb);
  else fb();
}

function choose(btn){
  if(answered)return;
  answered=true;
  var x=session[idx];
  var chosen=decodeURIComponent(btn.getAttribute('data-o'));
  var ok=(chosen===x.a);
  if(ok)scoreC++;else missedIds.push(x.id);
  record(x.id,ok);
  var all=document.querySelectorAll('#opts .ans');
  for(var i=0;i<all.length;i++){
    var bb=all[i];bb.classList.add('done');
    var o=decodeURIComponent(bb.getAttribute('data-o'));
    if(o===x.a)bb.classList.add('correct');else if(bb===btn)bb.classList.add('wrong');
  }
  var last=(idx+1>=session.length);
  document.getElementById('fb').innerHTML='<div class="exp '+(ok?'okbox':'ngbox')+'">'
  +'<div class="verd">'+(ok?'✓ 正解':'✕ 不正解')+' ・ 答え：'+esc(x.a)+'</div>'
  +'<div>'+fmt(x.e)+'</div></div>'
  +etyBlock(x)

/* ---------- 和訳の問題一覧（1問だけやり直す） ---------- */
function trExcerpt(x){
  var m=x.q.match(/\*\*(.+?)\*\*/);       // 下線部和訳は下線部を代表文に
  var t=(m?m[1]:x.q).replace(/\*\*/g,'');
  return t.length>52?t.slice(0,52)+'…':t;
}
function trHeading(x){                      // 解説 e の先頭 **構文名** を見出しに使う
  var m=(x.e||'').match(/^\s*\*\*(.+?)\*\*/);
  return m?m[1].trim():'';
}
var TRGROUPS=[['和訳・構文確認','レベル1：構文確認'],['和訳・実戦','レベル2：実戦・記事抜粋']];
function trOrderedList(){                    // 問題一覧と同じ並び順で和訳問題を一列に返す
  var AD=activeData(),out=[];
  for(var g=0;g<TRGROUPS.length;g++){
    for(var i=0;i<AD.length;i++)if(AD[i].cat===TRGROUPS[g][0])out.push(AD[i]);
  }
  return out;
}
function renderTrList(){
  var list=trOrderedList();
  var b='',curCat='';
  for(var i=0;i<list.length;i++){
    var x=list[i];
    if(x.cat!==curCat){                      // カテゴリが変わったら見出しを挿入
      curCat=x.cat;
      for(var g=0;g<TRGROUPS.length;g++)if(TRGROUPS[g][0]===curCat)b+='<div class="secttl">'+TRGROUPS[g][1]+'</div>';
    }
    var log=TRLOG[x.id];
    var attempted=log&&log.length;
    var right;                              // 右側：全点数の履歴 or 未挑戦
    if(attempted){
      right='<span class="trscores">'+log.map(function(r){
        var sc=r.sc;
        return '<span class="'+(sc>=7?'acc-high':sc>=5?'acc-mid':'acc-low')+'">'+sc+'</span>';
      }).join('')+'</span>';
    }else{
      right='<span class="mut">未挑戦</span>';
    }
    var head=attempted?trHeading(x):'';      // 見出しは挑戦済みだけ（ネタバレ防止）
    var main,sub='';
    if(head){
      main='<span style="font-weight:700">'+esc(head)+'</span>';
      sub='<div class="mut" style="margin-top:3px">'+esc(trExcerpt(x))+'</div>';
    }else{
      main='<span style="font-weight:400">'+esc(trExcerpt(x))+'</span>';
    }
    b+='<button class="opt" onclick="startOne('+x.id+')">'
    +'<span class="cathead">'+main+right+'</span>'+sub
    +'</button>';
  }
  h('<div class="wrap">'
  +'<h1>和訳の問題一覧</h1>'
  +'<div class="sub">タップした問題から一覧の並び順で続けて演習できます。点数は過去の採点履歴（古い→新しい順）。見出しは一度解いた問題だけ表示します</div>'
  +b
  +'<button class="ghost" onclick="renderMenu()">メニューに戻る</button>'
  +'</div>');
}
function startOne(id){                       // タップした問題から一覧の並び順で以降すべてを演習
  var list=trOrderedList();
  var pos=-1;
  for(var i=0;i<list.length;i++)if(list[i].id===id){pos=i;break;}
  if(pos<0){renderMenu();return;}
  session=list.slice(pos);
  idx=0;scoreC=0;missedIds=[];
  renderQ();
}

/* ---------- カテゴリ別成績（弱点分析） ---------- */
function renderCats(){
  var m={},order=[];
  var AD=activeData();
  for(var i=0;i<AD.length;i++){
    var x=AD[i];
    if(!m[x.cat]){m[x.cat]={cat:x.cat,total:0,seen:0,correct:0,mastered:0};order.push(x.cat);}
    var g=m[x.cat];g.total++;
    var s=stat(x.id);g.seen+=s.s;g.correct+=s.c;
    if(tier(x)===3)g.mastered++;
  }
  var rows=order.map(function(k){return m[k];});
  rows.sort(function(a,b){
    var aa=a.seen?a.correct/a.seen:2,bb=b.seen?b.correct/b.seen:2; // 未学習は最後
    if(aa!==bb)return aa-bb;
    return b.total-a.total;
  });
  var b='';
  for(var j=0;j<rows.length;j++){
    var r=rows[j];
    var acc=r.seen?Math.round(r.correct/r.seen*100):null;
    var cls=acc===null?'mut':(acc<70?'acc-low':acc<85?'acc-mid':'acc-high');
    b+='<button class="opt" onclick="start(\'cat\',\''+encodeURIComponent(r.cat)+'\')">'
    +'<span class="cathead"><span><b>'+esc(r.cat)+'</b> <span class="mut">'+r.total+'問・マスター'+r.mastered+'</span></span>'
    +'<span class="'+cls+'">'+(acc===null?'未学習':acc+'%')+'</span></span>'
    +'<span class="catbar"><span class="fill" style="width:'+(acc||0)+'%"></span></span>'
    +'</button>';
  }
  h('<div class="wrap">'
  +'<h1>カテゴリ別の成績</h1>'
  +'<div class="sub">累計の正答率が低い順に並んでいます。タップするとそのカテゴリだけ練習できます</div>'
  +b
  +'<button class="ghost" onclick="renderMenu()">メニューに戻る</button>'
  +'</div>');
}

/* ---------- 問題の追加メモ（あとで Claude Code に依頼する用） ---------- */
function renderIdeas(){
  var b='';
  for(var i=IDEAS.length-1;i>=0;i--){
    var it=IDEAS[i];
    b+='<div class="card idea"><div class="mut">'+esc(it.d||'')+'</div><div>'+fmt(it.t)+'</div>'
    +'<button class="ghost" onclick="delIdea('+i+')">削除</button></div>';
  }
  h('<div class="wrap">'
  +'<h1>問題の追加メモ</h1>'
  +'<div class="sub">追加したい問題・単語・派生パターンを思いついたらここにメモ。<br>「全メモをコピー」して Claude Code に貼れば、questions.json に問題を作って追加してもらえます</div>'
  +'<div class="card"><textarea id="ideaTa" class="io jp" placeholder="例：embark の問題を追加（disembark と対で）／ in charge of のイディオム"></textarea>'
  +'<button class="primary" onclick="addIdea()">メモを追加</button></div>'
  +(IDEAS.length?'<button class="primary alt" onclick="copyIdeas()">全メモをコピー<small>Claude Code への依頼文の形でコピーします</small></button>':'')
  +b
  +'<button class="ghost" onclick="renderMenu()">メニューに戻る</button>'
  +'</div>');
}
function addIdea(){
  var v=document.getElementById('ideaTa').value.trim();
  if(!v){toast('メモを入力してください');return;}
  IDEAS.push({t:v,d:localDay()});
  save();
  renderIdeas();
  toast('メモを追加しました');
}
function delIdea(i){
  IDEAS.splice(i,1);
  save();
  renderIdeas();
}
function copyIdeas(){
  var lines=IDEAS.map(function(it){return '- '+(it.d?'('+it.d+') ':'')+it.t;});
  var p='英語ドリルアプリの questions.json に、以下のメモをもとに新しい問題を追加してください。'
  +'既存の形式（4択は q/a/d/e、和訳は type:"tr" で q/a/e）に合わせて、解説と必要に応じて語源（ety）も付けてください。\n\n'
  +lines.join('\n');
  copyText(p,'依頼文をコピーしました');
}

    +'<button class="ghost" onclick="clearSyncCfg()">この端末の同期を解除</button>'
    +'</div>';
  }else{

    +'<div class="mut" style="margin:8px 0;line-height:1.8">'

    +'2. 表示された ghp_… を下に貼り付けて「同期を開始」<br>'
    +'3. 別の端末でも同じトークンを貼れば、自動でつながります</div>'
    +'<a href="https://github.com/settings/tokens/new?scopes=gist&description=kdai-drill-sync" target="_blank" rel="noopener">→ トークン作成ページを開く</a>'
    +'<input id="tokIn" class="io ti" type="password" placeholder="ghp_ で始まるトークンを貼り付け" autocomplete="off">'
    +'<button class="primary sm" onclick="setupSync()">同期を開始</button>'
    +'<div class="mut" style="margin-top:6px">トークンはこの端末の中だけに保存され、エクスポートにも含まれません。共用端末では設定しないでください。</div>'
    +'</div>';
  }

  +(AI.key
    ?'✅ Claude採点は設定済みです。和訳で「訳例と解説を見る」を押すと自動で添削・採点され、点数がそのまま記録されます。'
    :'APIキーを設定すると、和訳の「訳例と解説を見る」で自動的にClaudeが添削・採点し、点数を記録します（従量課金・1問あたり数円）。'
     +'<div class="mut" style="margin:8px 0"><a href="https://platform.claude.com/settings/keys" target="_blank" rel="noopener">→ Anthropic Console でAPIキーを作成</a></div>')
  +'<input id="aiKeyIn" class="io ti" type="password" placeholder="'+(AI.key?'設定済み（変更する場合のみ貼り付け）':'sk-ant- で始まるAPIキーを貼り付け')+'" autocomplete="off">'
  +'<select id="aiModel" class="io">'
  +'<option value="claude-opus-4-8"'+(AI.model==='claude-opus-4-8'?' selected':'')+'>Claude Opus 4.8（採点品質を最優先・約2円/問）</option>'
  +'<option value="claude-sonnet-5"'+(AI.model==='claude-sonnet-5'?' selected':'')+'>Claude Sonnet 5（コスパ重視・約1円/問）</option>'
  +'</select>'
  +'<button class="primary sm" onclick="aiSave()">'+(AI.key?'設定を更新':'Claude採点を有効にする')+'</button>'
  +(AI.key?'<button class="ghost" onclick="aiClear()">この端末の設定を解除</button>':'')
  +'<div class="mut" style="margin-top:6px">キーはこの端末の中だけに保存され、エクスポートにも含まれません。Console側で月額上限の設定を推奨します。</div>'
  +'</div>';

  var gl='';
  for(var gi=0;gi<hids.length;gi++){
    var gq=null;
    for(var gj=0;gj<DATA.length;gj++)if(String(DATA[gj].id)===String(hids[gi])){gq=DATA[gj];break;}
    if(!gq)continue;
    gl+='<div class="cathead" style="margin:8px 0"><span class="mut">'+esc(gq.q.length>42?gq.q.slice(0,42)+'…':gq.q)+'</span>'
    +'<button class="ghost" style="width:auto;padding:2px 8px" onclick="restoreQ('+gq.id+')">復元</button></div>';

    :'解答後に「この問題を卒業」を押すと、覚えきった問題を出題対象から外せます。')+'</div>';
  h('<div class="wrap">'

  +'</div>'
  +'<button class="reset danger" onclick="resetAll()">学習履歴をすべてリセット</button>'

}
function expFile(){
  var blob=new Blob([JSON.stringify(snapshot(),null,1)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='kdai-progress-'+localDay().replace(/-/g,'')+'.json';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(function(){URL.revokeObjectURL(a.href);},5000);
  toast('ダウンロードを開始しました');
}
function expCopy(){
  var code=JSON.stringify(snapshot());
  var ta=document.getElementById('expTa');
  ta.value=code;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).then(function(){toast('コピーしました');},function(){ta.select();toast('長押しでコピーしてください');});
  }else{ta.select();try{document.execCommand('copy');toast('コピーしました');}catch(e){toast('長押しでコピーしてください');}}
}
function doImport(text){
  var obj;
  try{obj=JSON.parse(text);}catch(e){toast('読み取れませんでした（形式エラー）');return;}
  if(!confirm('現在の進捗を取り込んだデータで上書きします。よろしいですか？'))return;
  try{applySnapshot(obj);}catch(e){toast('このファイルは進捗データではありません');return;}
  save();
  toast('インポートしました');
  renderMenu();
}
function impFile(input){
  var f=input.files&&input.files[0];
  if(!f)return;
  var r=new FileReader();
  r.onload=function(){doImport(r.result);};
  r.readAsText(f);
  input.value='';
}
function impText(){
  var t=document.getElementById('impTa').value.trim();
  if(!t){toast('コードを貼り付けてください');return;}
  doImport(t);
}
function resetAll(){
  if(confirm('すべての学習履歴（和訳の過去回答を含む）を消去します。よろしいですか？')){
    STATS={};META={streak:0,lastDay:'',best:0};TRLOG={};save();renderMenu();
  }
}

/* ---------- 起動 ---------- */
function boot(){
  loadSyncCfg();
  loadAiCfg();
  loadProgress().then(function(){
    return pullSync();                 // 他端末の進捗があれば取り込む（失敗しても続行）
  }).then(function(){
    return fetch('questions.json').then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.json();
    });
  }).then(function(data){
    DATA=data;
    renderMenu();
  }).catch(function(e){
    h('<div class="wrap"><h1>読み込みエラー</h1>'
    +'<div class="warn">問題データを読み込めませんでした（'+esc(e.message)+'）。<br>通信環境を確認して再読み込みしてください。</div>'
    +'<button class="primary" onclick="location.reload()">再読み込み</button></div>');
  });
}
// Ctrl+Enter（Macは⌘+Enter）で、いま押すべきボタンを状況に応じて実行する。
// 和訳の入力中に何度Enterしても改行できるよう、修飾キー付きのときだけ反応させる。
document.addEventListener('keydown',function(ev){
  if(ev.key!=='Enter'||!(ev.ctrlKey||ev.metaKey))return;
  if(!session||!session.length)return;
  var x=session[idx];if(!x)return;
  if(x.type==='tr'){
    if(!answered){ev.preventDefault();revealTr();}          // 入力中 → 訳例と解説を見る（採点開始）
    else if(trDone){ev.preventDefault();next();}            // 採点済み → 次へ
  }else{
    if(answered){ev.preventDefault();next();}               // 4択：回答後 → 次へ
  }
});
// 旧バージョンのService Workerが残っていたら解除しておく
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister();});}).catch(function(){});
}
boot();
</script>
