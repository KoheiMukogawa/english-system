name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      # 航大アプリ(app)をルート、京大アプリ(app-kyoto)を /app-kyoto/ に配置。
      # kyoto-uni の過去問PDF等はデプロイ対象に含めない。
      - name: Assemble site (app at root, app-kyoto under /app-kyoto/)
        run: |
          mkdir -p _site/app-kyoto
          cp -r app/. _site/
          cp -r app-kyoto/. _site/app-kyoto/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
