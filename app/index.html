<html lang="ja">
<head>
<meta charset="utf-8">

<title>航大英語 大問I ドリル</title>
<style>
:root{--bg:#eef1f6;--card:#fff;--ink:#1a2230;--mut:#6b7280;--acc:#2563eb;--line:#e2e6ee;}
@media (prefers-color-scheme:dark){:root{--bg:#0e1520;--card:#18212f;--ink:#e7ebf1;--mut:#94a0b3;--acc:#3b82f6;--line:#28313f;}}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;line-height:1.6;-webkit-text-size-adjust:100%;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.wrap{max-width:620px;margin:0 auto;padding:20px 16px 70px}
h1{font-size:22px;margin:6px 0 2px}
h2{font-size:17px;margin:18px 0 8px}
.sub{color:var(--mut);font-size:13px;margin-bottom:14px}
.stats{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
.pill{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 10px;font-size:12px;color:var(--mut);flex:1;min-width:66px;text-align:center}
.pill b{display:block;font-size:20px;color:var(--ink);line-height:1.2}
.pill.red b{color:#dc2626}.pill.blue b{color:var(--acc)}.pill.green b{color:#16a34a}.pill.orange b{color:#ea580c}
.primary{display:block;width:100%;border:none;border-radius:14px;background:var(--acc);color:#fff;padding:15px;font-size:16px;font-weight:700;margin:10px 0;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent}
.primary small{display:block;font-weight:400;font-size:12px;opacity:.92;margin-top:3px}
.primary.big{padding:18px}
.primary.alt{background:var(--card);color:var(--ink);border:1.5px solid var(--line)}
.primary.alt small{opacity:.7}
.secttl{margin:20px 0 6px;font-size:13px;color:var(--mut);font-weight:700}
.opt{display:block;width:100%;text-align:left;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;font-size:16px;color:var(--ink);margin:8px 0;cursor:pointer;-webkit-tap-highlight-color:transparent}
.opt .mut{color:var(--mut);font-size:12px}
.opt.ans{font-weight:600}
.opt.done{opacity:.5}
.opt.correct{background:#dcfce7;border-color:#16a34a;color:#14532d;opacity:1}
.opt.wrong{background:#fee2e2;border-color:#dc2626;color:#7f1d1d;opacity:1}
@media (prefers-color-scheme:dark){.opt.correct{background:#0f2e1c;border-color:#1f7a44;color:#86efac}.opt.wrong{background:#3a1414;border-color:#a83232;color:#fca5a5}}
.bar{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin:2px 0 14px}
.fill{height:100%;background:var(--acc);transition:width .3s}
.qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px}
.chip{background:var(--acc);color:#fff;font-size:11px;padding:3px 9px;border-radius:99px;font-weight:700;white-space:nowrap}
.mut{color:var(--mut);font-size:12px}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;font-size:18px;font-weight:600;margin-bottom:10px}
.exp{border-radius:12px;padding:14px;margin:10px 0;font-size:14px}
.okbox{background:#dcfce7;border:1px solid #86efac}
.ngbox{background:#fef3c7;border:1px solid #fcd34d}
@media (prefers-color-scheme:dark){.okbox{background:#0f2e1c;border-color:#1f5133}.ngbox{background:#3a2f10;border-color:#6b5417}}
.verd{font-weight:700;margin-bottom:6px}
.ghost{display:block;width:100%;background:none;border:none;color:var(--mut);padding:12px;font-size:14px;margin-top:6px;cursor:pointer}
.reset{display:block;width:100%;background:none;border:1px solid var(--line);color:var(--mut);border-radius:12px;padding:12px;font-size:13px;margin-top:24px;cursor:pointer}
.reset.danger{border-color:#dc2626;color:#dc2626}
.foot{color:var(--mut);font-size:11px;text-align:center;margin-top:14px;line-height:1.7}
.warn{background:#fef3c7;border:1px solid #fcd34d;color:#7c5b12;border-radius:12px;padding:10px 12px;font-size:12px;margin:10px 0}
@media (prefers-color-scheme:dark){.warn{background:#3a2f10;border-color:#6b5417;color:#fcd34d}}
.result{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;margin:14px 0}
.big2{font-size:42px;font-weight:800;line-height:1.1}
.done{color:var(--mut);text-align:center;margin:16px 0}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:10px 0;font-size:14px}
textarea.io{width:100%;height:110px;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--ink);font-size:11px;padding:8px;font-family:ui-monospace,monospace;resize:vertical}
.filelbl{display:block;width:100%;text-align:center;border:1.5px dashed var(--line);border-radius:12px;padding:14px;font-size:14px;color:var(--mut);cursor:pointer;margin:8px 0}
.filelbl input{display:none}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:99px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:9;white-space:nowrap}
.toast.show{opacity:.95}
.loading{text-align:center;color:var(--mut);padding:80px 20px;font-size:14px}
.cathead{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.catbar{display:block;height:5px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:8px}
.catbar .fill{display:block;height:100%}
.acc-low{color:#dc2626;font-weight:700}.acc-mid{color:#ea580c;font-weight:700}.acc-high{color:#16a34a;font-weight:700}
.qcard.tr{font-weight:400;font-size:16px;padding:14px}
.qcard strong{font-weight:700;text-decoration:underline;text-underline-offset:4px;text-decoration-color:var(--acc)}
textarea.io.jp{font-family:inherit;font-size:15px;height:84px;background:var(--card)}
.primary.sm{padding:10px;font-size:13px;font-weight:600;margin:6px 0}
.scorerow{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.scorebtn{flex:1;min-width:42px;padding:11px 0;border:1.5px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);font-size:15px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.scorebtn.hi{border-color:var(--acc);color:var(--acc)}
.etybox{background:#f3e8ff;border:1px solid #d8b4fe}
@media (prefers-color-scheme:dark){.etybox{background:#2a1f3f;border-color:#584180}}
.notebox{background:var(--card);border:1px dashed var(--mut)}
.notebox .ghost,.idea .ghost{padding:6px 0 0;text-align:left;width:auto}
</style>
</head>
<body>
<div id="app"><div class="loading">読み込み中…</div></div>
<div id="toast" class="toast"></div>
<script>
'use strict';
var APP_V='2.3.1';
var DAY=86400000;
var BOX_DAYS=[0,1,3,7,14];           // Leitner: box番号 → 次回出題までの日数
var MASTER_BOX=3;                    // box3以上＝マスター扱い
var DATA=[];
var STATS={};                        // id → {s,c,w,st,last,box,due}
var META={streak:0,lastDay:'',best:0};
var NOTES={};                        // id → 自分メモ
var IDEAS=[];                        // 追加したい問題のメモ [{t,d}]

/* ---------- 永続化：IndexedDB（localStorageにも二重保存） ---------- */
var DB_KEY='kdai_v2';
var LEGACY_KEY='kdai_stats_v1';
var dbp=null;
function openDB(){
  if(dbp)return dbp;
  dbp=new Promise(function(res,rej){
    if(!window.indexedDB){rej(new Error('no idb'));return;}
    var r=indexedDB.open('kdai',1);
    r.onupgradeneeded=function(){r.result.createObjectStore('kv');};
    r.onsuccess=function(){res(r.result);};
    r.onerror=function(){rej(r.error);};
  });
  return dbp;
}
function idbGet(k){
  return openDB().then(function(db){
    return new Promise(function(res,rej){
      var q=db.transaction('kv','readonly').objectStore('kv').get(k);
      q.onsuccess=function(){res(q.result);};
      q.onerror=function(){rej(q.error);};
    });
  });
}
function idbSet(k,v){
  return openDB().then(function(db){
    return new Promise(function(res,rej){
      var t=db.transaction('kv','readwrite');
      t.objectStore('kv').put(v,k);
      t.oncomplete=function(){res();};
      t.onerror=function(){rej(t.error);};
    });
  });
}
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function snapshot(){return {v:2,app:APP_V,exported:new Date().toISOString(),stats:STATS,meta:META,notes:NOTES,ideas:IDEAS};}
function save(){
  var json=JSON.stringify(snapshot());
  lsSet(DB_KEY,json);                       // 同期の安全網
  idbGet && idbSet(DB_KEY,json).catch(function(){});
}
function migrateLegacy(){
  // 旧プロトタイプ（localStorage kdai_stats_v1）からの移行
  var raw=lsGet(LEGACY_KEY);
  if(!raw)return false;
  try{
    var old=JSON.parse(raw);var now=Date.now();
    Object.keys(old).forEach(function(id){
      var s=old[id];
      var box=(s.st>=2)?2:(s.s>0?1:0);
      if(s.w>0&&s.st<2)box=0;
      STATS[id]={s:s.s||0,c:s.c||0,w:s.w||0,st:s.st||0,last:s.last||'',box:box,due:now};
    });
    return true;
  }catch(e){return false;}
}
function applySnapshot(obj){
  if(!obj||obj.v!==2||typeof obj.stats!=='object')throw new Error('bad format');
  STATS=obj.stats||{};
  META=obj.meta||{streak:0,lastDay:'',best:0};
  NOTES=obj.notes||{};
  IDEAS=obj.ideas||[];
}
function loadProgress(){
  return idbGet(DB_KEY).catch(function(){return null;}).then(function(v){
    var raw=v||lsGet(DB_KEY);
    if(raw){try{applySnapshot(JSON.parse(raw));return;}catch(e){}}
    if(migrateLegacy())save();
  });
}

/* ---------- SRS（Leitner） ---------- */
function stat(id){return STATS[id]||{s:0,c:0,w:0,st:0,last:'',box:0,due:0};}
function record(id,ok){
  var s=stat(id);var now=Date.now();
  s.s++;
  if(ok){s.c++;s.st++;s.box=Math.min((s.box||0)+1,BOX_DAYS.length-1);}
  else{s.w++;s.st=0;s.box=0;}
  s.due=now+BOX_DAYS[s.box]*DAY;
  s.last=ok?'o':'x';
  STATS[id]=s;
  bumpStreak();
  save();
}
function localDay(t){
  var d=t?new Date(t):new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function bumpStreak(){
  var today=localDay();
  if(META.lastDay===today)return;
  var yest=localDay(Date.now()-DAY);
  META.streak=(META.lastDay===yest)?(META.streak||0)+1:1;
  META.lastDay=today;
  if(META.streak>(META.best||0))META.best=META.streak;
}
function currentStreak(){
  if(!META.lastDay)return 0;
  var today=localDay(),yest=localDay(Date.now()-DAY);
  return (META.lastDay===today||META.lastDay===yest)?(META.streak||0):0;
}
// tier: 0=復習待ち(due超過) 1=未学習 2=学習中 3=マスター
function tier(x){
  var s=stat(x.id);var now=Date.now();
  if(s.s===0)return 1;
  if(s.due<=now)return 0;
  return s.box>=MASTER_BOX?3:2;
}
function counts(){
  var c={review:0,newq:0,learning:0,mastered:0,seen:0,correct:0,total:DATA.length};
  for(var i=0;i<DATA.length;i++){
    var t=tier(DATA[i]);
    if(t===0)c.review++;else if(t===1)c.newq++;else if(t===2)c.learning++;else c.mastered++;
    var s=stat(DATA[i].id);c.seen+=s.s;c.correct+=s.c;
  }
  return c;
}
function isTr(x){return x.type==='tr';}
function notTr(x){return x.type!=='tr';}
function isMiss(x){var s=stat(x.id);return s.w>0&&s.box<MASTER_BOX;}
// smart: due超過（期限切れが古い順）→ 未学習 → 学習中/マスター（due近い順）
function smartOrder(pool,n){
  var t=[[],[],[],[]];
  for(var i=0;i<pool.length;i++)t[tier(pool[i])].push(pool[i]);
  var byDue=function(a,b){return stat(a.id).due-stat(b.id).due;};
  t[0].sort(byDue);
  shuffle(t[1]);
  var rest=t[2].concat(t[3]).sort(byDue);
  return t[0].concat(t[1],rest).slice(0,n);
}
function makeSession(mode,part){
  var list;
  if(mode==='mistakes'){
    list=DATA.filter(function(x){return notTr(x)&&isMiss(x);});shuffle(list);
  }else if(mode==='trmistakes'){
    list=DATA.filter(function(x){return isTr(x)&&isMiss(x);});shuffle(list);
  }else if(mode==='part'){
    list=DATA.filter(function(x){return x.part===part;});shuffle(list);
  }else if(mode==='cat'){
    list=DATA.filter(function(x){return x.cat===part;});shuffle(list);
  }else if(mode==='all'){
    list=DATA.filter(notTr);shuffle(list);list=list.slice(0,25);
  }else if(mode==='trsmart'){
    list=smartOrder(DATA.filter(isTr),8);
  }else{
    list=smartOrder(DATA.filter(notTr),20);
  }
  return list;
}

/* ---------- ユーティリティ ---------- */
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toast._t);toast._t=setTimeout(function(){el.classList.remove('show');},2200);
}
function copyText(t,msg){
  function fb(){
    var ta=document.createElement('textarea');
    ta.value=t;document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');toast(msg);}catch(e){toast('コピーできませんでした');}
    ta.remove();
  }
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(t).then(function(){toast(msg);},fb);
  else fb();
}

/* ---------- 画面 ---------- */
var session=null,idx=0,scoreC=0,answered=false,missedIds=[];
var app=document.getElementById('app');
function h(s){app.innerHTML=s;window.scrollTo(0,0);}

function renderMenu(){
  session=null;
  var c=counts();
  var acc=c.seen?Math.round(c.correct/c.seen*100):0;
  var streak=currentStreak();
  var parts=[['Part 1','前置詞コロケーション'],['Part 2','句動詞'],['Part 3','イディオム・慣用'],['Part 4','文法・語法'],['Part 5','ことわざ'],['Part 6','トピック語彙']];
  var pc={};for(var i=0;i<DATA.length;i++)pc[DATA[i].part]=(pc[DATA[i].part]||0)+1;
  var pb='';
  for(var j=0;j<parts.length;j++){
    var p=parts[j];
    pb+='<button class="opt" onclick="start(\'part\',\''+p[0]+'\')"><b>'+p[0]+'</b> '+p[1]+' <span class="mut">'+(pc[p[0]]||0)+'問</span></button>';
  }
  var qMiss=DATA.filter(function(x){return notTr(x)&&isMiss(x);}).length;
  var trMiss=DATA.filter(function(x){return isTr(x)&&isMiss(x);}).length;
  var l1=DATA.filter(function(x){return x.cat==='和訳・構文確認';}).length;
  var l2=DATA.filter(function(x){return x.cat==='和訳・実戦';}).length;
  h('<div class="wrap">'
  +'<h1>航大英語ドリル</h1>'
  +'<div class="sub">全'+c.total+'問 ・ 移動中の反復用</div>'
  +'<div class="stats">'
  +'<div class="pill red"><b>'+c.review+'</b>復習待ち</div>'
  +'<div class="pill blue"><b>'+c.newq+'</b>未学習</div>'
  +'<div class="pill green"><b>'+c.mastered+'</b>マスター</div>'
  +'<div class="pill"><b>'+acc+'%</b>正答率</div>'
  +'<div class="pill orange"><b>'+streak+'</b>連続日数</div>'
  +'</div>'
  +'<div class="secttl">大問Ⅰ対策（語彙・文法 4択）</div>'
  +'<button class="primary big" onclick="start(\'smart\')">スマート復習を始める<small>期限が来た問題・未学習を優先して20問</small></button>'
  +'<button class="primary alt" onclick="start(\'mistakes\')">間違えた問題だけ<small>未マスターの誤答 '+qMiss+'問</small></button>'
  +'<button class="primary alt" onclick="start(\'all\')">全問からランダム25問</button>'
  +'<button class="primary alt" onclick="renderCats()">カテゴリ別の成績<small>弱点カテゴリを確認して、そのまま練習</small></button>'
  +'<div class="secttl">パート別に練習</div>'
  +pb
  +'<div class="secttl">大問Ⅲ対策（英文和訳・Claude採点）</div>'
  +'<button class="primary big" onclick="start(\'trsmart\')">和訳スマート復習<small>期限が来た和訳・未学習を優先して8問</small></button>'
  +'<button class="primary alt" onclick="start(\'cat\',\''+encodeURIComponent('和訳・構文確認')+'\')">レベル1：構文確認 <small>倒置・強調・比較・無生物主語など頻出構文を1文で（'+l1+'問）</small></button>'
  +'<button class="primary alt" onclick="start(\'cat\',\''+encodeURIComponent('和訳・実戦')+'\')">レベル2：実戦・記事抜粋<small>航空・医学・時事の下線部和訳、難関国立レベル（'+l2+'問）</small></button>'
  +(trMiss?'<button class="primary alt" onclick="start(\'trmistakes\')">間違えた和訳だけ<small>未マスターの誤答 '+trMiss+'問</small></button>':'')
  +'<button class="reset" onclick="renderIdeas()">問題の追加メモ'+(IDEAS.length?'（'+IDEAS.length+'）':'')+'</button>'
  +'<button class="reset" onclick="renderData()">データ管理（バックアップ・引き継ぎ）</button>'
  +'<div class="foot">進捗はこの端末に自動保存されます。<br>正解を重ねると出題間隔が 1日→3日→7日→14日 と延び、間違えるとすぐ復習に戻ります。<br>v'+APP_V+'</div>'
  +'</div>');
}

function start(mode,part){
  if(part)part=decodeURIComponent(part);
  session=makeSession(mode,part);idx=0;scoreC=0;missedIds=[];
  if(!session.length){
    h('<div class="wrap"><h1>🎉 出題なし</h1><p class="done">いま表示できる問題がありません。<br>「間違えた問題だけ」は、一度間違えて まだマスターしていない問題が対象です。全部できています。</p><button class="primary" onclick="renderMenu()">メニューに戻る</button></div>');
    return;
  }
  renderQ();
}

function renderQ(){
  answered=false;
  var x=session[idx];
  if(x.type==='tr'){renderTr(x);return;}
  var opts=shuffle([x.a].concat(x.d));
  var prog=Math.round(idx/session.length*100);
  var b='';
  for(var i=0;i<opts.length;i++)b+='<button class="opt ans" data-o="'+encodeURIComponent(opts[i])+'" onclick="choose(this)">'+esc(opts[i])+'</button>';
  h('<div class="wrap">'
  +'<div class="bar"><div class="fill" style="width:'+prog+'%"></div></div>'
  +'<div class="qmeta"><span class="chip">'+esc(x.cat)+'</span><span class="mut">'+(idx+1)+' / '+session.length+' ・ 正解 '+scoreC+'</span></div>'
  +'<div class="qcard">'+esc(x.q)+'</div>'
  +'<div id="opts">'+b+'</div>'
  +'<div id="fb"></div>'
  +'<button class="ghost" onclick="renderMenu()">中断してメニューへ</button>'
  +'</div>');
}

function choose(btn){
  if(answered)return;
  answered=true;
  var x=session[idx];
  var chosen=decodeURIComponent(btn.getAttribute('data-o'));
  var ok=(chosen===x.a);
  if(ok)scoreC++;else missedIds.push(x.id);
  record(x.id,ok);
  var all=document.querySelectorAll('#opts .ans');
  for(var i=0;i<all.length;i++){
    var bb=all[i];bb.classList.add('done');
    var o=decodeURIComponent(bb.getAttribute('data-o'));
    if(o===x.a)bb.classList.add('correct');else if(bb===btn)bb.classList.add('wrong');
  }
  var last=(idx+1>=session.length);
  document.getElementById('fb').innerHTML='<div class="exp '+(ok?'okbox':'ngbox')+'">'
  +'<div class="verd">'+(ok?'✓ 正解':'✕ 不正解')+' ・ 答え：'+esc(x.a)+'</div>'
  +'<div>'+fmt(x.e)+'</div></div>'
  +etyBlock(x)
  +memoBlock(x.id)
  +'<button class="primary" onclick="next()">'+(last?'結果を見る':'次へ')+'</button>';
}

/* ---------- 和訳問題（type:"tr"）：自分の訳を入力→Claudeに採点依頼 ---------- */
function renderTr(x){
  var prog=Math.round(idx/session.length*100);
  var excerpt=x.q.indexOf('**')>=0;   // 下線部和訳（**〜**が訳す範囲）
  h('<div class="wrap">'
  +'<div class="bar"><div class="fill" style="width:'+prog+'%"></div></div>'
  +'<div class="qmeta"><span class="chip">'+esc(x.cat)+'</span><span class="mut">'+(idx+1)+' / '+session.length+' ・ 正解 '+scoreC+'</span></div>'
  +'<div class="qcard tr">'+fmt(x.q)+'</div>'
  +'<textarea id="trIn" class="io jp" placeholder="'+(excerpt?'下線部の和訳を入力（文脈を踏まえて）':'ここに和訳を入力')+'"></textarea>'
  +'<button class="primary alt sm" onclick="copyTr()">英文＋自分の訳をコピー</button>'
  +'<button class="primary" onclick="revealTr()">訳例と解説を見る</button>'
  +'<div id="fb"></div>'
  +'<button class="ghost" onclick="renderMenu()">中断してメニューへ</button>'
  +'</div>');
}
function copyTr(){
  var x=session[idx];
  var mine=(document.getElementById('trIn').value||'').trim()||'（未記入）';
  copyText('【英文】\n'+x.q+'\n\n【私の和訳】\n'+mine,'英文と自分の訳をコピーしました');
}
function revealTr(){
  if(answered)return;
  answered=true;
  var x=session[idx];
  var sb='';
  for(var i=0;i<=10;i++)sb+='<button class="scorebtn'+(i>=7?' hi':'')+'" onclick="gradeTr('+i+')">'+i+'</button>';
  document.getElementById('fb').innerHTML=
   '<div id="grade">'
  +'<div class="secttl">自己採点（7点以上で◯・復習間隔に反映）</div>'
  +'<div class="scorerow">'+sb+'</div>'
  +'</div>'
  +'<div class="exp okbox"><div class="verd">訳例</div><div>'+fmt(x.a)+'</div></div>'
  +'<div class="exp ngbox"><div class="verd">ポイント</div><div>'+fmt(x.e)+'</div></div>'
  +etyBlock(x)
  +'<div id="nextSlot"></div>';
}
function gradeTr(score){
  var x=session[idx];
  var ok=score>=7;
  if(ok)scoreC++;else missedIds.push(x.id);
  record(x.id,ok);
  var last=(idx+1>=session.length);
  document.getElementById('grade').innerHTML=
   '<div class="verd">'+score+' / 10 点 ・ '+(ok?'◯で記録しました':'✕で記録：間隔を詰めて再出題します')+'</div>';
  document.getElementById('nextSlot').innerHTML=
   memoBlock(x.id)
  +'<button class="primary" onclick="next()">'+(last?'結果を見る':'次へ')+'</button>';
}

/* ---------- 語源・自分メモ ---------- */
function etyBlock(x){
  if(!x.ety)return '';
  return '<div class="exp etybox"><div class="verd">🔍 語源で覚える</div><div>'+fmt(x.ety)+'</div></div>';
}
function memoBlock(id){
  var n=NOTES[id];
  return '<div id="memoBox">'+(n
   ?'<div class="exp notebox"><div class="verd">📝 自分メモ</div><div>'+fmt(n)+'</div><button class="ghost" onclick="editMemo('+id+')">メモを編集</button></div>'
   :'<button class="ghost" onclick="editMemo('+id+')">＋ この問題にメモを残す</button>')
  +'</div>';
}
function editMemo(id){
  document.getElementById('memoBox').innerHTML=
   '<div class="exp notebox"><div class="verd">📝 自分メモ</div>'
  +'<textarea id="memoTa" class="io jp" placeholder="間違えた理由・覚え方など">'+esc(NOTES[id]||'')+'</textarea>'
  +'<button class="primary alt" onclick="saveMemo('+id+')">メモを保存</button></div>';
  document.getElementById('memoTa').focus();
}
function saveMemo(id){
  var v=document.getElementById('memoTa').value.trim();
  if(v)NOTES[id]=v;else delete NOTES[id];
  save();
  document.getElementById('memoBox').outerHTML=memoBlock(id);
  toast(v?'メモを保存しました':'メモを削除しました');
}

function next(){idx++;if(idx>=session.length)renderDone();else renderQ();}

function renderDone(){
  var n=session.length;
  var acc=Math.round(scoreC/n*100);
  var missBtn=missedIds.length
    ?'<button class="primary" onclick="startMissed()">今の間違い '+missedIds.length+'問をすぐ復習</button>'
    :'';
  h('<div class="wrap"><h1>お疲れさま！</h1>'
  +'<div class="result"><div class="big2">'+scoreC+' / '+n+'</div><div class="mut">このセッションの正答率 '+acc+'%</div></div>'
  +missBtn
  +'<button class="primary alt" onclick="start(\'smart\')">もう一度スマート復習</button>'
  +'<button class="ghost" onclick="renderMenu()">メニューに戻る</button></div>');
}

function startMissed(){
  var ids=missedIds.slice();
  session=DATA.filter(function(x){return ids.indexOf(x.id)>=0;});
  shuffle(session);idx=0;scoreC=0;missedIds=[];
  renderQ();
}

/* ---------- カテゴリ別成績（弱点分析） ---------- */
function renderCats(){
  var m={},order=[];
  for(var i=0;i<DATA.length;i++){
    var x=DATA[i];
    if(!m[x.cat]){m[x.cat]={cat:x.cat,total:0,seen:0,correct:0,mastered:0};order.push(x.cat);}
    var g=m[x.cat];g.total++;
    var s=stat(x.id);g.seen+=s.s;g.correct+=s.c;
    if(tier(x)===3)g.mastered++;
  }
  var rows=order.map(function(k){return m[k];});
  rows.sort(function(a,b){
    var aa=a.seen?a.correct/a.seen:2,bb=b.seen?b.correct/b.seen:2; // 未学習は最後
    if(aa!==bb)return aa-bb;
    return b.total-a.total;
  });
  var b='';
  for(var j=0;j<rows.length;j++){
    var r=rows[j];
    var acc=r.seen?Math.round(r.correct/r.seen*100):null;
    var cls=acc===null?'mut':(acc<70?'acc-low':acc<85?'acc-mid':'acc-high');
    b+='<button class="opt" onclick="start(\'cat\',\''+encodeURIComponent(r.cat)+'\')">'
    +'<span class="cathead"><span><b>'+esc(r.cat)+'</b> <span class="mut">'+r.total+'問・マスター'+r.mastered+'</span></span>'
    +'<span class="'+cls+'">'+(acc===null?'未学習':acc+'%')+'</span></span>'
    +'<span class="catbar"><span class="fill" style="width:'+(acc||0)+'%"></span></span>'
    +'</button>';
  }
  h('<div class="wrap">'
  +'<h1>カテゴリ別の成績</h1>'
  +'<div class="sub">累計の正答率が低い順に並んでいます。タップするとそのカテゴリだけ練習できます</div>'
  +b
  +'<button class="ghost" onclick="renderMenu()">メニューに戻る</button>'
  +'</div>');
}

/* ---------- 問題の追加メモ（あとで Claude Code に依頼する用） ---------- */
function renderIdeas(){
  var b='';
  for(var i=IDEAS.length-1;i>=0;i--){
    var it=IDEAS[i];
    b+='<div class="card idea"><div class="mut">'+esc(it.d||'')+'</div><div>'+fmt(it.t)+'</div>'
    +'<button class="ghost" onclick="delIdea('+i+')">削除</button></div>';
  }
  h('<div class="wrap">'
  +'<h1>問題の追加メモ</h1>'
  +'<div class="sub">追加したい問題・単語・派生パターンを思いついたらここにメモ。<br>「全メモをコピー」して Claude Code に貼れば、questions.json に問題を作って追加してもらえます</div>'
  +'<div class="card"><textarea id="ideaTa" class="io jp" placeholder="例：embark の問題を追加（disembark と対で）／ in charge of のイディオム"></textarea>'
  +'<button class="primary" onclick="addIdea()">メモを追加</button></div>'
  +(IDEAS.length?'<button class="primary alt" onclick="copyIdeas()">全メモをコピー<small>Claude Code への依頼文の形でコピーします</small></button>':'')
  +b
  +'<button class="ghost" onclick="renderMenu()">メニューに戻る</button>'
  +'</div>');
}
function addIdea(){
  var v=document.getElementById('ideaTa').value.trim();
  if(!v){toast('メモを入力してください');return;}
  IDEAS.push({t:v,d:localDay()});
  save();
  renderIdeas();
  toast('メモを追加しました');
}
function delIdea(i){
  IDEAS.splice(i,1);
  save();
  renderIdeas();
}
function copyIdeas(){
  var lines=IDEAS.map(function(it){return '- '+(it.d?'('+it.d+') ':'')+it.t;});
  var p='英語ドリルアプリの questions.json に、以下のメモをもとに新しい問題を追加してください。'
  +'既存の形式（4択は q/a/d/e、和訳は type:"tr" で q/a/e）に合わせて、解説と必要に応じて語源（ety）も付けてください。\n\n'
  +lines.join('\n');
  copyText(p,'依頼文をコピーしました');
}

/* ---------- データ管理（エクスポート／インポート） ---------- */
function renderData(){
  h('<div class="wrap">'
  +'<h1>データ管理</h1>'
  +'<div class="sub">機種変更・バックアップ用に進捗を書き出し／取り込みできます</div>'
  +'<h2>エクスポート</h2>'
  +'<div class="card">学習履歴をファイルとして保存するか、コードをコピーして新しい端末に貼り付けてください。'
  +'<button class="primary" onclick="expFile()">ファイルをダウンロード</button>'
  +'<button class="primary alt" onclick="expCopy()">コードをコピー</button>'
  +'<textarea id="expTa" class="io" readonly placeholder="「コードをコピー」を押すとここに表示されます"></textarea>'
  +'</div>'
  +'<h2>インポート</h2>'
  +'<div class="card">エクスポートしたファイルを選ぶか、コードを貼り付けて取り込みます。<b>現在の進捗は上書きされます。</b>'
  +'<label class="filelbl">ファイルを選択<input type="file" accept=".json,application/json" onchange="impFile(this)"></label>'
  +'<textarea id="impTa" class="io" placeholder="ここにコードを貼り付け"></textarea>'
  +'<button class="primary" onclick="impText()">貼り付けたコードを取り込む</button>'
  +'</div>'
  +'<button class="reset danger" onclick="resetAll()">学習履歴をすべてリセット</button>'
  +'<button class="ghost" onclick="renderMenu()">メニューに戻る</button>'
  +'</div>');
}
function expFile(){
  var blob=new Blob([JSON.stringify(snapshot(),null,1)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='kdai-progress-'+localDay().replace(/-/g,'')+'.json';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(function(){URL.revokeObjectURL(a.href);},5000);
  toast('ダウンロードを開始しました');
}
function expCopy(){
  var code=JSON.stringify(snapshot());
  var ta=document.getElementById('expTa');
  ta.value=code;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).then(function(){toast('コピーしました');},function(){ta.select();toast('長押しでコピーしてください');});
  }else{ta.select();try{document.execCommand('copy');toast('コピーしました');}catch(e){toast('長押しでコピーしてください');}}
}
function doImport(text){
  var obj;
  try{obj=JSON.parse(text);}catch(e){toast('読み取れませんでした（形式エラー）');return;}
  if(!confirm('現在の進捗を取り込んだデータで上書きします。よろしいですか？'))return;
  try{applySnapshot(obj);}catch(e){toast('このファイルは進捗データではありません');return;}
  save();
  toast('インポートしました');
  renderMenu();
}
function impFile(input){
  var f=input.files&&input.files[0];
  if(!f)return;
  var r=new FileReader();
  r.onload=function(){doImport(r.result);};
  r.readAsText(f);
  input.value='';
}
function impText(){
  var t=document.getElementById('impTa').value.trim();
  if(!t){toast('コードを貼り付けてください');return;}
  doImport(t);
}
function resetAll(){
  if(confirm('すべての学習履歴を消去します。よろしいですか？')){
    STATS={};META={streak:0,lastDay:'',best:0};save();renderMenu();
  }
}

/* ---------- 起動 ---------- */
function boot(){
  loadProgress().then(function(){
    return fetch('questions.json').then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.json();
    });
  }).then(function(data){
    DATA=data;
    renderMenu();
  }).catch(function(e){
    h('<div class="wrap"><h1>読み込みエラー</h1>'
    +'<div class="warn">問題データを読み込めませんでした（'+esc(e.message)+'）。<br>通信環境を確認して再読み込みしてください。</div>'
    +'<button class="primary" onclick="location.reload()">再読み込み</button></div>');
  });
}
// 旧バージョンのService Workerが残っていたら解除しておく
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister();});}).catch(function(){});
}
boot();
</script>
